<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BITE SHOES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
  background:
    linear-gradient(
      rgba(0,0,0,0.75),
      rgba(0,0,0,0.75)
    ),
    url(bite-hero-background.png);

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  font-family: 'Montserrat', sans-serif;
  color: #fff;
  margin: 0;
  padding: 0;
}
    header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.8);
    backdrop-filter:blur(10px);

    z-index:999;
}
.header-content{
    width:100%;
    padding:0 60px;

    display:flex;
    align-items:center;
}

nav{
    margin-left:auto;
}

nav ul{
    display:flex;
    gap:40px;
    list-style:none;
    margin:0;
    padding:0;
}

nav a{
    color:#fff;
    text-decoration:none;
    letter-spacing:2px;
    font-family:'Cinzel',serif;
    transition:.3s;
}

nav a:hover{
    color:#c0c0c0;
}
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #fff;
    }
    .logo img{
    height:40px;
    width:auto;
    display:block;
}
    .logo span {
      color: #c0c0c0;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 1rem;
      margin: 0;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    nav ul li a:hover {
  color: #c0c0c0 !important;
    } 
    h1{
    text-align:center;
    margin:120px 0 2rem;
}
    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 0 2rem 2rem;
    }
    .showcase-item {
  position: relative;
  overflow: hidden;
  height: 250px;

  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);

  display: block;
}
    .showcase-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .showcase-item:hover img {
      transform: scale(1.1);
    }
    .showcase-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .showcase-item:hover .showcase-overlay {
      transform: translateY(0);
    }
    .showcase-overlay h3 {
      font-size: 1.1rem;
      color: #fff;
      margin: 0 0 0.3rem 0;
    }
    .showcase-overlay p {
      font-size: 0.9rem;
      color: #ccc;
      margin: 0;
    }
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .showcase-item {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-content">

        <div class="logo">
            <img src="Logo.png" alt="BITE Logo">
        </div>

        <nav>
            <ul>
                <li><a href="BEST.html">BEST</a></li>
                <li><a href="OUTER.html">OUTER</a></li>
                <li><a href="TOP.html">TOP</a></li>
                <li><a href="BOTTOM.html">BOTTOM</a></li>
                <li><a href="SHOES.html">SHOES</a></li>
                <li><a href="ACC.html">ACC</a></li>
            </ul>
        </nav>

    </div>
</header>

  <h1>SHOES</h1>

  <div class="showcase-grid">
    <a class="showcase-item">
      <img src="SHOES PHOTO/Leopard-4.png" alt="Leopard-4">
      <div class="showcase-overlay">
        <h3>Leopard-4</h3>
        <p>$156.24 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="SHOES PHOTO/Edge Runner.png" alt="Edge Runner">
      <div class="showcase-overlay">
        <h3>Edge Runner</h3>
        <p>$156.24 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="SHOES PHOTO/Reploca 2002 x TC.webp" alt="Reploca 2002 x TC">
      <div class="showcase-overlay">
        <h3>Reploca 2002 x TC</h3>
        <p>$199.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="SHOES PHOTO/Dragon Boots WHITE.webp" alt="Dragon Boots WHITE">
      <div class="showcase-overlay">
        <h3>Dragon Boots WHITE</h3>
        <p>$349.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="SHOES PHOTO/Dragon Boots RED.webp" alt="Dragon Boots RED">
      <div class="showcase-overlay">
        <h3>Dragon Boots RED</h3>
        <p>$349.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="SHOES PHOTO/Dragon Boots BLACK.webp" alt="Dragon Boots BLACK">
      <div class="showcase-overlay">
        <h3>Dragon Boots BLACK</h3>
        <p>$349.00 USD</p>
      </div>
    </a>
  </div>
    <p style="text-align: center; margin-top: 2rem;">
    <a href="index.html" style="color:#c0c0c0;">← Back</a>
    </p>
</body>
</html>
