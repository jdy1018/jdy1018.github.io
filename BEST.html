<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BITE ACC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   body {
  background:
    linear-gradient(
      rgba(0,0,0,0.75),
      rgba(0,0,0,0.75)
    ),
    url(bite-hero-background.png);

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  font-family: 'Montserrat', sans-serif;
  color: #fff;
  margin: 0;
  padding: 0;
}
    header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.8);
    backdrop-filter:blur(10px);

    z-index:999;
}
.header-content{
    width:100%;
    padding:0 60px;

    display:flex;
    align-items:center;
}

nav{
    margin-left:auto;
}

nav ul{
    display:flex;
    gap:40px;
    list-style:none;
    margin:0;
    padding:0;
}

nav a{
    color:#fff;
    text-decoration:none;
    letter-spacing:2px;
    font-family:'Cinzel',serif;
    transition:.3s;
}

nav a:hover{
    color:#c0c0c0;
}
    .logo img{
    height:40px;
    width:auto;
    display:block;
}
    .logo span {
      color: #c0c0c0;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 1rem;
      margin: 0;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    nav ul li a:hover {
  color: #c0c0c0 !important;
    } 
    h1{
    text-align:center;
    margin:120px 0 2rem;
}
    .showcase-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .showcase-item:hover img {
      transform: scale(1.1);
    }
    .showcase-grid{
    display:grid;

    grid-template-columns:
    repeat(2,minmax(500px,1fr));

    gap:80px;

    width:85%;

    margin:0 auto;
}

.showcase-item{

    text-decoration:none;

    background:transparent;

    overflow:hidden;
}

.showcase-item img{

    width:100%;

    aspect-ratio:1/1;

    object-fit:contain;

    transition:0.4s;
}

.showcase-item:hover img{

    transform:scale(1.03);
}

.showcase-item{

    position:relative;
    overflow:hidden;
    text-decoration:none;
    background:transparent;
}

.showcase-overlay{
    position:absolute;

    left:30px;
    bottom:25px;

    opacity:0;
    transform:translateY(15px);

    transition:all .35s ease;

    z-index:10;
}

.showcase-item:hover .showcase-overlay{
    opacity:1;
    transform:translateY(0);
}

.showcase-item:hover .showcase-overlay{

    opacity:1;
}

.showcase-overlay h3{
    margin:0 0 8px 0;

    font-size:1.5rem;
    font-family:'Cinzel',serif;

    color:#fff;
}

.showcase-overlay p{
    margin:0;

    font-size:1rem;

    color:#c0c0c0;

    letter-spacing:1px;
}
    .showcase-overlay h3 {
      font-size: 1.1rem;
      color: #fff;
      margin: 0 0 0.3rem 0;
    }
    .showcase-overlay p {
      font-size: 0.9rem;
      color: #ccc;
      margin: 0;
    }
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .showcase-item {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-content">

        <div class="logo">
            <img src="Logo.png" alt="BITE Logo">
        </div>

        <nav>
            <ul>
                <li><a href="BEST.html">BEST</a></li>
                <li><a href="OUTER.html">OUTER</a></li>
                <li><a href="TOP.html">TOP</a></li>
                <li><a href="BOTTOM.html">BOTTOM</a></li>
                <li><a href="SHOES.html">SHOES</a></li>
                <li><a href="ACC.html">ACC</a></li>
            </ul>
        </nav>

    </div>
  </header>

  <h1>BEST</h1>

  <div class="showcase-grid">
    <a class="showcase-item">
      <img src="OUTER PHOTO/BITE LEATHER JACKET.png" alt="BITE LEATHER JACKET">
      <div class="showcase-overlay">
        <h3>BITE LEATHER JACKET</h3>
        <p>$1,130.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="ACC PHOTO/BITE Belt.png" alt="BITE Belt">
      <div class="showcase-overlay">
        <h3>BITE Belt</h3>
        <p>$1,944.56 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="ACC PHOTO/BITE Ring.png" alt="BITE Ring">
      <div class="showcase-overlay">
        <h3>BITE Ring</h3>
        <p>$400.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="ACC PHOTO/Leopard-1.png" alt="Leopard-1">
      <div class="showcase-overlay">
        <h3>Leopard-1</h3>
        <p>$357.73 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="OUTER PHOTO/Soldier-1.png" alt="Soldier-1">
      <div class="showcase-overlay">
        <h3>Soldier-1</h3>
        <p>$199.00 USD</p>
      </div>
    </a>
    <a class="showcase-item">
      <img src="ACC PHOTO/Python-1.png" alt="Python-1">
      <div class="showcase-overlay">
        <h3>Python-1</h3>
        <p>$158.00 USD</p>
      </div>
    </a>
  </div>
    <p style="text-align: center; margin-top: 2rem;">
    <a href="index.html" style="color:#c0c0c0;">← Back</a>
    </p>
</body>
</html>
